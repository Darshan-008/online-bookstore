{% extends 'base.html' %}
{% block title %}Login — BookHaven{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" id="login-card">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-sign-in-alt"></i>
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to your BookHaven account</p>
        </div>
        <form action="{{ url_for('auth.login') }}" method="POST" class="auth-form" id="login-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="login-submit">
                <i class="fas fa-arrow-right"></i> Sign In
            </button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.register_page') }}">Create one</a></p>
        </div>
    </div>
</div>
{% endblock %}
