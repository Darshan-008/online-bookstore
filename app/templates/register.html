{% extends 'base.html' %}
{% block title %}Register — BookHaven{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card" id="register-card">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Create Account</h1>
            <p>Join BookHaven and start shopping</p>
        </div>
        <form action="{{ url_for('auth.register') }}" method="POST" class="auth-form" id="register-form">
            <div class="form-group">
                <label for="name"><i class="fas fa-user"></i> Full Name</label>
                <input type="text" name="name" id="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" id="password" placeholder="Min 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="register-submit">
                <i class="fas fa-check"></i> Create Account
            </button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login_page') }}">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
